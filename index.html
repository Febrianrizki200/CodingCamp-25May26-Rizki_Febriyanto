<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense & Budget Visualizer</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
        <div class="header-section">
            <h1>Expense Visualizer</h1>
            <div class="balance-card">
                <h2>Total Expenses</h2>
                <div class="amount" id="total-balance">Rp 0</div>
            </div>
        </div>

        <div class="card">
            <h3>Add Transaction</h3>
            <form id="expense-form">
                <div class="form-group">
                    <label for="item-name">Item Name</label>
                    <input type="text" id="item-name" class="form-control" placeholder="e.g., Lunch, Train ticket" required>
                </div>
                <div class="form-group">
                    <label for="item-amount">Amount (Rp)</label>
                    <input type="number" id="item-amount" class="form-control" placeholder="e.g., 50000" min="1" required>
                </div>
                <div class="form-group">
                    <label for="item-category">Category</label>
                    <select id="item-category" class="form-control" required>
                        <option value="" disabled selected>Select a category</option>
                        <option value="Food">Food & Dining</option>
                        <option value="Transport">Transportation</option>
                        <option value="Fun">Entertainment & Fun</option>
                        <option value="Utilities">Utilities & Bills</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <button type="submit" class="btn">Add Expense</button>
            </form>
        </div>

        <div class="card">
            <h3>Spending by Category</h3>
            <div class="chart-container">
                <canvas id="expense-chart"></canvas>
            </div>
        </div>

        <div class="card" style="grid-column: 1 / -1;">
            <h3>Recent Transactions</h3>
            <div class="transaction-container">
                <div class="list-container" id="transaction-list">
                    </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
