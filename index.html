<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense & Budget Visualizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
        
        <div class="top-nav">
            <button id="theme-toggle" class="icon-btn" title="Toggle Dark/Light Mode">🌙</button>
        </div>

        <div class="header-section">
            <h1>Financial Visualizer</h1>
            
            <div class="balance-card">
                <div class="main-balance">
                    <h2>Saldo Akhir</h2>
                    <div class="amount" id="net-balance">Rp 0</div>
                </div>
                
                <div class="balance-stats">
                    <div class="stat-box income">
                        <h3>Total Pemasukan</h3>
                        <p id="total-income">Rp 0</p>
                    </div>
                    <div class="stat-box expense">
                        <h3>Total Pengeluaran</h3>
                        <p id="total-expense">Rp 0</p>
                    </div>
                </div>

                <div class="filter-group">
                    <select id="month-filter" class="form-control select-month">
                        <option value="all">Semua Waktu</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>Tambah Transaksi</h3>
            <form id="expense-form">
                <div class="form-group">
                    <label>Jenis Transaksi</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="tx-type" value="expense" checked> Pengeluaran
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="tx-type" value="income"> Pemasukan
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="item-name">Nama Transaksi</label>
                    <input type="text" id="item-name" class="form-control" placeholder="e.g., Gaji Bulanan, Makan Siang" required>
                </div>
                <div class="form-group">
                    <label for="item-amount">Nominal (Rp)</label>
                    <input type="number" id="item-amount" class="form-control" placeholder="e.g., 50000" min="1" required>
                </div>
                <div class="form-group">
                    <label for="item-category">Kategori</label>
                    <select id="item-category" class="form-control" required>
                        </select>
                </div>
                <div class="form-group" id="custom-category-group" style="display: none;">
                    <label for="custom-category-input">Nama Kategori Baru</label>
                    <div style="display: flex; gap: 0.5rem;">
                        <input type="text" id="custom-category-input" class="form-control" placeholder="e.g., Pernikahan, Liburan">
                        <button type="button" id="add-custom-btn" class="btn btn-secondary" style="width: auto; margin: 0;">Tambah</button>
                    </div>
                </div>
                <button type="submit" class="btn">Simpan Transaksi</button>
            </form>
        </div>

        <div class="card">
            <h3>Distribusi Pengeluaran</h3>
            <div class="chart-container">
                <canvas id="expense-chart"></canvas>
            </div>
        </div>

        <div class="card" style="grid-column: 1 / -1;">
            <h3>Riwayat Transaksi</h3>
            <div class="transaction-container">
                <div class="list-container" id="transaction-list">
                    </div>
            </div>
        </div>

    </div>

    <script src="js/app.js"></script>
</body>
</html>
